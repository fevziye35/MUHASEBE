<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MAKFA Muhasebe - Banka Yönetimi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 30px; margin: 0; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a3a5f; border-bottom: 3px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        /* Giriş Formu Tasarımı */
        .form-section { background: #f8fafc; padding: 25px; border-radius: 10px; margin-bottom: 35px; border: 1px solid #e2e8f0; }
        .input-group { display: flex; flex-wrap: wrap; gap: 15px; }
        input, select { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; flex: 1; min-width: 150px; font-size: 15px; }
        button { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        button:hover { background: #27ae60; transform: translateY(-2px); }

        /* Tablo Tasarımı */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #1a3a5f; color: white; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        tr:hover { background: #f1f5f9; }
        
        .tutar-pozitif { color: #27ae60; font-weight: bold; }
        .tutar-negatif { color: #e74c3c; font-weight: bold; }
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-gelen { background: #dcfce7; color: #166534; }
        .badge-giden { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏦 Banka İşlem Kaydı</h2>
    
    <div class="form-section">
        <div class="input-group">
            <input type="text" id="banka_adi" placeholder="Banka Adı (Örn: Kuveyt Türk)">
            <input type="number" id="borc" placeholder="Tutar (₺)">
            <select id="tip">
                <option value="Gelen">Gelen Para (+)</option>
                <option value="Giden">Giden Para (-)</option>
            </select>
            <input type="text" id="aciklama" placeholder="İşlem Açıklaması">
            <button onclick="islemEkle()">KAYDET</button>
        </div>
    </div>

    <h2>📊 Güncel Hareket Listesi</h2>
    <table>
        <thead>
            <tr>
                <th>Banka</th>
                <th>Açıklama</th>
                <th>İşlem Tipi</th>
                <th>Tutar</th>
            </tr>
        </thead>
        <tbody id="hareket-tablosu">
            </tbody>
    </table>
</div>

<script>
    // Sizin Paylaştığınız Bilgilerle Bağlantı Kuruldu
    const SUPABASE_URL = 'https://sgfsutxadpilfnyjyope.supabase.co'; // URL'yi temizledim
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZnN1dHhhZHBpbGZueWp5b3BlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTcyMTUsImV4cCI6MjA5MjMzMzIxNX0.kc8Fkr6_MAKvhh_V3N5FCcM7t1P_Qti-UYO3c8w03wY';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. LİSTEYİ GETİR
    async function verileriYukle() {
        const { data, error } = await _supabase
            .from('banka_hareketleri')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            console.error("Hata:", error.message);
            return;
        }

        const tbody = document.getElementById('hareket-tablosu');
        tbody.innerHTML = '';

        data.forEach(item => {
            const isGelen = item.borc >= 0; // Bu mantığı senin tablo yapına göre kurduk
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.banka_adi || 'Kuveyt Türk'}</strong></td>
                    <td>${item.aciklama || '-'}</td>
                    <td><span class="badge ${isGelen ? 'badge-gelen' : 'badge-giden'}">${isGelen ? 'GELEN' : 'GİDEN'}</span></td>
                    <td class="${isGelen ? 'tutar-pozitif' : 'tutar-negatif'}">${item.borc} TL</td>
                </tr>
            `;
        });
    }

    // 2. YENİ VERİ EKLE
    async function islemEkle() {
        const banka = document.getElementById('banka_adi').value;
        const tutar = document.getElementById('borc').value;
        const aciklama = document.getElementById('aciklama').value;
        const tip = document.getElementById('tip').value;

        // Giden paraysa tutarı eksiye çeviriyoruz
        let finalTutar = parseFloat(tutar);
        if (tip === "Giden") finalTutar = -Math.abs(finalTutar);

        if(!banka || !tutar) { alert("Lütfen Banka ve Tutar alanlarını doldurun!"); return; }

        const { error } = await _supabase
            .from('banka_hareketleri')
            .insert([{ 
                banka_id: '60961200-58d1-447d-93ba-4007c20545dc', // Mevcut banka ID'niz
                aciklama: aciklama, 
                borc: finalTutar
            }]);

        if (error) {
            alert("Hata: " + error.message);
        } else {
            alert("İşlem başarıyla kaydedildi!");
            // Formu temizle ve listeyi yenile
            document.getElementById('borc').value = '';
            document.getElementById('aciklama').value = '';
            verileriYukle();
        }
    }

    // Sayfa açılınca verileri getir
    verileriYukle();
</script>

</body>
</html>
